# STGCN++ configuration for DIEMA-12 emotion classification
# 12 emotion classes (all except neutral), 25 joints (DIEMA rotation skeleton)
# Uses 6D continuous rotation representation (Zhou et al. 2019)

data:
  data_path: data/processed/diema12_quat.npz
  split_path: null              # use --fold/--num-folds for LPO
  target_repr: "6d"             # 6D continuous representation:
                                # no gimbal lock, no double-cover ambiguity
  num_workers: 16

model:
  type: stgcn
  num_class: 12
  in_channels: 6                # 6D representation → 6 channels per joint
  dropout: 0.5
  edge_weighting: true
  plusplus: true                 # multi-branch TCN (STGCN++): better temporal modeling
  unit_dropout: 0.15            # slightly higher than default 0.1 for regularization

skeleton:
  num_nodes: 25
  inward_edges:
    - [0, 1]
    - [2, 1]
    - [3, 2]
    - [4, 3]
    - [5, 4]
    - [6, 5]
    - [7, 6]
    - [8, 7]
    - [9, 5]
    - [10, 9]
    - [11, 10]
    - [12, 11]
    - [13, 5]
    - [14, 13]
    - [15, 14]
    - [16, 15]
    - [17, 1]
    - [18, 17]
    - [19, 18]
    - [20, 19]
    - [21, 1]
    - [22, 21]
    - [23, 22]
    - [24, 23]
  # Augmentation metadata (indices into joint_angles, 0-indexed)
  up_idx: 1            # Y-up
  lateral_idx: 0       # X is lateral
  root_order: "ZYX"
  lr_joint_pairs:
    - [12, 8]   # LeftShoulder <-> RightShoulder
    - [13, 9]   # LeftArm <-> RightArm
    - [14, 10]  # LeftForeArm <-> RightForeArm
    - [15, 11]  # LeftHand <-> RightHand
    - [20, 16]  # LeftUpLeg <-> RightUpLeg
    - [21, 17]  # LeftLeg <-> RightLeg
    - [22, 18]  # LeftFoot <-> RightFoot
    - [23, 19]  # LeftToeBase <-> RightToeBase
  rot_channels: "ZYX"  # Uniform across all 24 DIEMA joints

training:
  base_lr: 0.2
  optimizer: SGD
  scheduler_type: cosine
  weight_decay: 0.0005
  max_epochs: 65              # 12 classes converge slower than 7
  batch_size: 128               # 4090 has 24GB VRAM; each sample is 37KB,
                                # batch of 128 = 4.7MB
  clip_length: 64
  early_stopping: true
  early_stopping_monitor: "val_loss"
  early_stopping_patience: 10

augmentation:
  enabled: true                 # critical: fewer samples per class in 12-class
  rotate: true
  rotate_range: [-180, 180]     # full yaw rotation (emotion is view-invariant)
  mirror: true
  mirror_prob: 0.5
  speed: true                   # temporal stretching/compression
  speed_range: [0.8, 1.2]      # ±20% speed variation
  noise_sigma: 2.5              # quaternion noise in degrees (simulates sensor jitter)
